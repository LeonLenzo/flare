<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <title>flare.up - Symptom Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>flare.up</h1>
            <p class="subtitle">Track symptoms & cycles</p>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn" data-tab="log">Log</button>
            <button class="tab-btn active" data-tab="calendar">Calendar</button>
            <button class="tab-btn" data-tab="insights">Insights</button>
        </nav>

        <!-- LOG TAB -->
        <div class="tab-content" id="log-tab">
            <div class="date-selector">
                <button class="nav-btn" id="prev-day">‹</button>
                <input type="date" id="log-date" />
                <button class="nav-btn" id="next-day">›</button>
            </div>

            <section class="card">
                <h2>Cycle</h2>
                <div class="cycle-buttons">
                    <button class="cycle-btn" data-type="period-start">Start</button>
                    <button class="cycle-btn" data-type="period-end">Stop</button>
                </div>
                <div id="cycle-status" class="status-text"></div>
            </section>

            <section class="card">
                <h2>Daily Log</h2>
                <div class="flare-rating-container">
                    <label for="flare-rating">Flare rating (0-5)</label>
                    <input type="number" id="flare-rating" min="0" max="5" value="0" placeholder="0">
                </div>
                <div class="notes-section">
                    <label for="daily-notes">Notes</label>
                    <textarea id="daily-notes" placeholder="How are you feeling? Any observations..."></textarea>
                </div>
                <div class="auto-save-indicator">Changes saved automatically</div>
            </section>

            <section class="card">
                <h2>Food Diary</h2>
                <div class="food-diary-grid">
                    <div class="food-entry">
                        <label for="food-breakfast">Breakfast</label>
                        <textarea id="food-breakfast" rows="2" placeholder="What did you have..."></textarea>
                    </div>
                    <div class="food-entry">
                        <label for="food-lunch">Lunch</label>
                        <textarea id="food-lunch" rows="2" placeholder="What did you have..."></textarea>
                    </div>
                    <div class="food-entry">
                        <label for="food-dinner">Dinner</label>
                        <textarea id="food-dinner" rows="2" placeholder="What did you have..."></textarea>
                    </div>
                    <div class="food-entry">
                        <label for="food-snacks">Snacks</label>
                        <textarea id="food-snacks" rows="2" placeholder="What did you have..."></textarea>
                    </div>
                </div>
            </section>
        </div>

        <!-- CALENDAR TAB -->
        <div class="tab-content active" id="calendar-tab">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">‹</button>
                <div class="calendar-selectors">
                    <select id="month-select"></select>
                    <select id="year-select"></select>
                </div>
                <button class="nav-btn" id="next-month">›</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="calendar-legend-container">
                <div class="legend-section">
                    <h4>Cycle Phase</h4>
                    <div class="legend-items">
                        <div class="legend-item">
                            <span class="legend-color menstrual"></span>
                            <span>Menstrual</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color follicular"></span>
                            <span>Follicular</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color ovulation"></span>
                            <span>Ovulation</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-color luteal"></span>
                            <span>Luteal</span>
                        </div>
                    </div>
                    <p class="legend-note"><span class="symptom-score-highlight">Flare Rating</span> is shown on calendar days (0-5)</p>
                </div>
            </div>
        </div>

        <!-- INSIGHTS TAB -->
        <div class="tab-content" id="insights-tab">
            <section class="card">
                <h2>Cycle Summary</h2>
                <div id="cycle-summary"></div>
            </section>

            <section class="card">
                <h2>Flare Trends (Last 30 Days)</h2>
                <canvas id="flare-chart"></canvas>
            </section>

            <section class="card">
                <h2>Flare Rating by Cycle Phase</h2>
                <canvas id="phase-chart"></canvas>
            </section>

            <div class="export-section">
                <button id="export-data" class="secondary-btn">Export Data (JSON)</button>
                <button id="clear-data" class="danger-btn">Clear All Data</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
